server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any client-side route that doesn't exist on disk falls back to index.html
    # so React Router can handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (the filenames have content hashes, so this is safe)
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}